name: Publish to PyPI

on:
  push:
    tags:
      - "*"

jobs:
  verify-version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install toml

      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate tag matches pyproject version
        run: |
          TAG_VERSION=${GITHUB_REF_NAME}
          PY_VERSION=${{ steps.get_version.outputs.version }}

          echo "Tag version: $TAG_VERSION"
          echo "Project version: $PY_VERSION"

          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "Version mismatch: tag does not match pyproject.toml"
            exit 1
          fi

  build-and-publish:
    needs: verify-version
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: |
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-release:
    needs: build-and-publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract Release Notes
        run: |
          VERSION="${GITHUB_REF_NAME}"

          awk "/^## \[$VERSION\]/ {flag=1; next} /^## \[/ {flag=0} flag" CHANGELOG.md > RELEASE_BODY.md

          if [ ! -s RELEASE_BODY.md ]; then
            echo "No changelog entry found for $VERSION"
            exit 1
          fi

          echo "## What's changed" > FINAL_BODY.md
          cat RELEASE_BODY.md >> FINAL_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: FINAL_BODY.md
          files: dist/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}