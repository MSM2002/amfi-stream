name: Publish to PyPI

on:
  push:
    tags:
      - "*"

jobs:
  verify-version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install toml

      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate tag matches pyproject version
        run: |
          TAG_VERSION=${GITHUB_REF_NAME}
          PY_VERSION=${{ steps.get_version.outputs.version }}

          echo "Tag version: $TAG_VERSION"
          echo "Project version: $PY_VERSION"

          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "Version mismatch: tag does not match pyproject.toml"
            exit 1
          fi

  build-and-publish:
    needs: verify-version
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: |
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
